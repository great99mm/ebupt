services:
  app:
    image: dedehao/ebupt:latest
    environment:
      DATABASE_URL: sqlite:/data/ebupt.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-}
    ports:
      - "18080:8080"
    volumes:
      - ebupt_data:/data

volumes:
  ebupt_data:
